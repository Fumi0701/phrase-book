<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#5340b8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="フレーズ帳">
<title>英語フレーズ帳</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #f8f7ff;
  --surface: #ffffff;
  --surface2: #f2f0fb;
  --border: rgba(83,64,184,0.12);
  --border2: rgba(83,64,184,0.25);
  --accent: #5340b8;
  --accent-light: #eeedfe;
  --text: #1a1730;
  --text2: #6b6585;
  --text3: #a09bb5;
  --green: #0f6e56;
  --green-bg: #e1f5ee;
  --amber: #854f0b;
  --amber-bg: #faeeda;
  --coral: #993c1d;
  --coral-bg: #faece7;
  --gray-bg: #f1efe8;
  --gray-text: #444441;
  --radius: 14px;
  --radius-sm: 8px;
  --tab-h: 58px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #12101f;
    --surface: #1e1b30;
    --surface2: #272340;
    --border: rgba(180,160,255,0.12);
    --border2: rgba(180,160,255,0.25);
    --accent: #9b8ef5;
    --accent-light: #26215c;
    --text: #f0eeff;
    --text2: #a097c8;
    --text3: #665f8a;
    --green: #5dcaa5;
    --green-bg: #04342c;
    --amber: #ef9f27;
    --amber-bg: #412402;
    --coral: #f0997b;
    --coral-bg: #4a1b0c;
    --gray-bg: #2c2c2a;
    --gray-text: #d3d1c7;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer}

/* layout */
.screen{display:none;flex-direction:column;height:100dvh;padding-bottom:calc(var(--tab-h) + var(--safe-bottom))}
.screen.active{display:flex}
.header{padding:16px 16px 10px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10}
.header h1{font-size:17px;font-weight:600;color:var(--text)}
.scroll-area{flex:1;overflow-y:auto;padding:12px 14px;overscroll-behavior:contain}

/* bottom tabs */
.tabs{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-bottom));background:var(--surface);border-top:0.5px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;padding-bottom:var(--safe-bottom);z-index:20}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;background:none;border:none;font-size:10px;color:var(--text3);transition:color 0.15s}
.tab.on{color:var(--accent)}
.tab svg{width:22px;height:22px;stroke-width:1.8;fill:none;stroke:currentColor}

/* search bar */
.search-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.search-bar input{flex:1;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;font-size:15px;background:var(--surface);color:var(--text);outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar select{border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:9px 8px;font-size:14px;background:var(--surface);color:var(--text);outline:none}
.fab{width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(83,64,184,0.3)}

/* phrase cards */
.phrase-list{display:flex;flex-direction:column;gap:8px}
.pcard{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;transition:border-color 0.15s}
.pcard.open{border-color:var(--border2)}
.pcard-head{display:flex;align-items:center;gap:8px}
.pcard-main{flex:1;min-width:0}
.p-en{font-size:15px;font-weight:500;color:var(--text);line-height:1.4}
.p-ja{font-size:13px;color:var(--text2);margin-top:2px}
.cat-pill{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.cat-ビジネス{background:var(--accent-light);color:var(--accent)}
.cat-日常{background:var(--green-bg);color:var(--green)}
.cat-旅行{background:var(--amber-bg);color:var(--amber)}
.cat-その他{background:var(--gray-bg);color:var(--gray-text)}
.icon-btn{width:34px;height:34px;border-radius:50%;background:none;border:none;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0}
.icon-btn:active{background:var(--surface2)}
.fav-on{color:#e2813a}
.pcard-body{margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)}
.note-box{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;font-size:13px;color:var(--text2);line-height:1.75}

/* empty state */
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
.empty svg{width:40px;height:40px;stroke:var(--text3);fill:none;margin:0 auto 12px;display:block}

/* memo mode */
.memo-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.memo-top span{font-size:13px;color:var(--text2)}
.prog{flex:1;height:5px;background:var(--surface2);border-radius:3px}
.prog-fill{height:100%;border-radius:3px;background:var(--accent);transition:width 0.3s}
.flash{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:24px 20px;text-align:center;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;-webkit-user-select:none;user-select:none}
.flash-q{font-size:20px;font-weight:600;color:var(--text);line-height:1.4}
.flash-hint{font-size:12px;color:var(--text3)}
.flash-ans{font-size:15px;color:var(--text2);padding-top:14px;border-top:0.5px solid var(--border);width:100%;text-align:center;line-height:1.6}
.memo-actions{display:flex;gap:10px;margin-top:12px}
.memo-actions button{flex:1;padding:13px;border-radius:var(--radius);font-size:15px;font-weight:500;border:0.5px solid}
.btn-ng{background:var(--coral-bg);color:var(--coral);border-color:var(--coral)}
.btn-ok{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.memo-filter{margin-bottom:12px}
.memo-filter select{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;background:var(--surface);color:var(--text);outline:none}
.done-card{text-align:center;background:var(--surface);border-radius:var(--radius);padding:2.5rem 1.5rem}
.done-card .big{font-size:48px;margin-bottom:12px}
.done-card h2{font-size:18px;font-weight:600;margin-bottom:8px}
.done-card p{font-size:14px;color:var(--text2);margin-bottom:20px}
.restart-btn{width:100%;padding:13px;border-radius:var(--radius);background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:500}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:30;display:none;align-items:flex-end}
.overlay.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px 16px calc(20px + var(--safe-bottom));width:100%;max-height:90dvh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:600;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:15px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{min-height:70px;resize:vertical}
.modal-btns{display:flex;gap:10px;margin-top:4px}
.modal-btns button{flex:1;padding:13px;border-radius:var(--radius);font-size:15px;font-weight:500}
.btn-cancel{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border)}
.btn-save{background:var(--accent);color:#fff;border:none}
</style>
</head>
<body>

<div class="screen active" id="s-list">
  <div class="header">
    <h1>📖 フレーズ一覧</h1>
  </div>
  <div class="scroll-area">
    <div class="search-bar">
      <input type="search" id="search" placeholder="検索..." oninput="render()">
      <select id="fcat" onchange="render()">
        <option value="">すべて</option>
        <option value="ビジネス">ビジネス</option>
        <option value="日常">日常</option>
        <option value="旅行">旅行</option>
        <option value="その他">その他</option>
      </select>
      <button class="fab" onclick="openModal()" aria-label="追加">+</button>
    </div>
    <div class="phrase-list" id="list"></div>
  </div>
</div>

<div class="screen" id="s-fav">
  <div class="header">
    <h1>★ お気に入り</h1>
  </div>
  <div class="scroll-area">
    <div class="phrase-list" id="fav-list"></div>
  </div>
</div>

<div class="screen" id="s-memo">
  <div class="header">
    <h1>🧠 暗記モード</h1>
  </div>
  <div class="scroll-area" id="memo-area"></div>
</div>

<nav class="tabs">
  <button class="tab on" onclick="goTab('list')" id="t-list">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
    一覧
  </button>
  <button class="tab" onclick="goTab('fav')" id="t-fav">
    <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
    お気に入り
  </button>
  <button class="tab" onclick="goTab('memo')" id="t-memo">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    暗記
  </button>
</nav>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>フレーズを追加</h2>
    <div class="field">
      <label>英語フレーズ *</label>
      <input type="text" id="m-en" placeholder="Let me get back to you.">
    </div>
    <div class="field">
      <label>日本語メモ</label>
      <input type="text" id="m-ja" placeholder="後で返答します">
    </div>
    <div class="field">
      <label>カテゴリ</label>
      <select id="m-cat">
        <option value="ビジネス">ビジネス</option>
        <option value="日常">日常</option>
        <option value="旅行">旅行</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label>詳しいメモ・使い方</label>
      <textarea id="m-note" placeholder="使うシーンや注意点、例文など"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="savePhrase()">保存</button>
    </div>
  </div>
</div>

<script>
// --- データ ---
const STORE_KEY = 'phrases_v1';
let phrases = [];
let nextId = 1;

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
    if (d) { phrases = d.phrases; nextId = d.nextId; }
    else {
      phrases = [
        {id:1,en:"Let me get back to you on that.",ja:"後で返答します",cat:"ビジネス",note:"ビジネスの定番表現。少し時間を置いて考えたい時に便利。"},
        {id:2,en:"Could you say that again?",ja:"もう一度言ってもらえますか？",cat:"日常",note:"聞き取れなかった時に聞き返す定番のフレーズ。"},
        {id:3,en:"Where can I find a pharmacy?",ja:"薬局はどこですか？",cat:"旅行",note:"旅行先で体調を崩した時のために。"},
      ];
      nextId = 4;
      save();
    }
  } catch(e) { phrases=[]; nextId=1; }
}

function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify({phrases, nextId})); } catch(e){}
}

// --- タブ ---
let curTab = 'list';
let activeId = null;

function goTab(t) {
  curTab = t;
  ['list','fav','memo'].forEach(x => {
    document.getElementById('s-'+x).classList.toggle('active', x===t);
    document.getElementById('t-'+x).classList.toggle('on', x===t);
  });
  activeId = null;
  if (t === 'memo') startMemo();
  else if (t === 'fav') renderFav();
  else render();
}

// --- 一覧 ---
function render() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  const cat = document.getElementById('fcat').value;
  const filtered = phrases.filter(p =>
    (!q || p.en.toLowerCase().includes(q) || p.ja.toLowerCase().includes(q)) &&
    (!cat || p.cat === cat)
  );
  document.getElementById('list').innerHTML = filtered.length
    ? filtered.map(cardHTML).join('')
    : emptyHTML('一覧');
}

function renderFav() {
  const favs = phrases.filter(p => p.fav);
  document.getElementById('fav-list').innerHTML = favs.length
    ? favs.map(cardHTML).join('')
    : emptyHTML('fav');
}

function cardHTML(p) {
  const isOpen = activeId === p.id;
  // メモ欄（note）がある場合のみ、カードを開いたときに表示する
  const hasBody = p.note;
  
  return `<div class="pcard${isOpen && hasBody ?' open':''}" id="pc-${p.id}">
    <div class="pcard-head" onclick="toggle(${p.id})">
      <div class="pcard-main">
        <div class="p-en">${esc(p.en)}</div>
        ${p.ja ? `<div class="p-ja">${esc(p.ja)}</div>` : ''}
      </div>
      <span class="cat-pill cat-${p.cat}">${p.cat}</span>
      <button class="icon-btn${p.fav?' fav-on':''}" onclick="event.stopPropagation();toggleFav(${p.id})" aria-label="お気に入り">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="${p.fav?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
      </button>
      <button class="icon-btn" onclick="event.stopPropagation();del(${p.id})" aria-label="削除">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
    ${isOpen && hasBody ? `<div class="pcard-body">
      <div class="note-box">📝 ${esc(p.note).replace(/\n/g, '<br>')}</div>
    </div>` : ''}
  </div>`;
}

function emptyHTML(type) {
  return `<div class="empty">
    <svg viewBox="0 0 24 24"><path d="M9 12h6M9 16h4M17 21H7a2 2 0 01-2-2V5a2 2 0 012-2h7l5 5v11a2 2 0 01-2 2z"/></svg>
    ${type==='fav' ? 'お気に入りがありません' : 'フレーズがありません'}
  </div>`;
}

function toggle(id) {
  // メモがあるデータのみ、タップで開閉できるようにする
  const p = phrases.find(x => x.id === id);
  if (!p || !p.note) return;
  
  activeId = (activeId === id) ? null : id;
  if (curTab === 'fav') renderFav(); else render();
}

function toggleFav(id) {
  const p = phrases.find(x => x.id === id);
  if (p) { p.fav = !p.fav; save(); }
  if (curTab === 'fav') renderFav(); else render();
}

function del(id) {
  if (!confirm('削除しますか？')) return;
  phrases = phrases.filter(p => p.id !== id);
  if (activeId === id) activeId = null;
  save();
  if (curTab === 'fav') renderFav(); else render();
}

// --- 追加モーダル ---
function openModal() {
  ['m-en','m-ja','m-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('m-cat').value = 'ビジネス';
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('m-en').focus(), 100);
}
function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}
function savePhrase() {
  const en = document.getElementById('m-en').value.trim();
  if (!en) { document.getElementById('m-en').focus(); return; }
  phrases.unshift({
    id: nextId++,
    en,
    ja: document.getElementById('m-ja').value.trim(),
    cat: document.getElementById('m-cat').value,
    note: document.getElementById('m-note').value.trim(),
    fav: false
  });
  save(); closeModal(); render();
}

// --- 暗記モード ---
let memoQueue = [], memoIdx = 0, memoShown = false, memoScore = {ok:0,ng:0};
let memoCat = '';

function startMemo() {
  const src = memoCat ? phrases.filter(p => p.cat === memoCat) : phrases;
  memoQueue = [...src].sort(() => Math.random() - 0.5);
  memoIdx = 0; memoShown = false; memoScore = {ok:0,ng:0};
  renderMemo();
}

function renderMemo() {
  const el = document.getElementById('memo-area');
  const total = memoQueue.length;

  let catSel = `<div class="memo-filter"><select onchange="memoCat=this.value;startMemo()">
    <option value="">すべてのカテゴリ</option>
    <option value="ビジネス"${memoCat==='ビジネス'?' selected':''}>ビジネス</option>
    <option value="日常"${memoCat==='日常'?' selected':''}>日常</option>
    <option value="旅行"${memoCat==='旅行'?' selected':''}>旅行</option>
    <option value="その他"${memoCat==='その他'?' selected':''}>その他</option>
  </select></div>`;

  if (!total) {
    el.innerHTML = catSel + emptyHTML('');
    return;
  }

  if (memoIdx >= total) {
    el.innerHTML = catSel + `<div class="done-card">
      <div class="big">🎉</div>
      <h2>完了！</h2>
      <p>覚えた: <strong style="color:var(--green)">${memoScore.ok}</strong> もう一度: <strong style="color:var(--coral)">${memoScore.ng}</strong></p>
      <button class="restart-btn" onclick="startMemo()">もう一度やる</button>
    </div>`;
    return;
  }

  const p = memoQueue[memoIdx];
  const pct = Math.round(memoIdx / total * 100);

  el.innerHTML = catSel + `
    <div class="memo-top">
      <span>${memoIdx+1} / ${total}</span>
      <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span>✓${memoScore.ok} ✗${memoScore.ng}</span>
    </div>
    <div class="flash" onclick="reveal()" role="button">
      <span class="cat-pill cat-${p.cat}">${p.cat}</span>
      <div class="flash-q">${esc(p.en)}</div>
      ${memoShown ? `<div class="flash-ans">${esc(p.ja||'（日本語メモなし）')}${p.note?`<br><small style="color:var(--text3)">📝 ${esc(p.note).replace(/\n/g, ' ')}</small>`:''}</div>`
        : `<div class="flash-hint">タップして答えを見る</div>`}
    </div>
    ${memoShown ? `<div class="memo-actions">
      <button class="btn-ng" onclick="memoNext(false)">✗ もう一度</button>
      <button class="btn-ok" onclick="memoNext(true)">✓ 覚えた！</button>
    </div>` : ''}
  `;
}

function reveal() {
  if (!memoShown) { memoShown = true; renderMemo(); }
}
function memoNext(ok) {
  if (ok) memoScore.ok++; else { memoScore.ng++; memoQueue.push(memoQueue[memoIdx]); }
  memoIdx++; memoShown = false; renderMemo();
}

// --- utils ---
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- PWA ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// --- init ---
load(); render();
</script>
</body>
</html>
